name: Deploy to EC2

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-ec2
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync code to EC2
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".pnpm-store" \
            --exclude ".env" \
            -e "ssh" \
            ./ ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/app

      - name: Deploy on EC2
        run: |
          ssh ec2-user@${{ secrets.EC2_HOST }} bash -s << 'ENDSSH'
            set -euo pipefail
            cd /home/ec2-user/app

            # Build in background so SSH session doesn't time out
            nohup bash -c '
              docker compose up --build -d
              docker system prune -f
            ' > /home/ec2-user/deploy.log 2>&1 &

            BUILD_PID=$!
            TIMEOUT=720
            ELAPSED=0
            while kill -0 $BUILD_PID 2>/dev/null; do
              sleep 10
              ELAPSED=$((ELAPSED + 10))
              if [ $ELAPSED -ge $TIMEOUT ]; then
                echo "Build timed out after ${TIMEOUT}s"
                exit 1
              fi
            done

            echo "=== Deploy log (last 30 lines) ==="
            tail -30 /home/ec2-user/deploy.log
            echo "=== Running containers ==="
            docker compose ps
          ENDSSH
